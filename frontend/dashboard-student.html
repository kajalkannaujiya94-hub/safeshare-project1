<!DOCTYPE html>
<html lang="en">
<head>
    <script src="env.js"></script>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <title>Student Dashboard - SafeShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            font-family: 'Segoe UI', sans-serif;
            padding: 30px 20px;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            border-radius: 16px;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .navbar-brand h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .navbar-user span {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        .navbar-user strong {
            color: #333;
        }
        .badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-logout {
            padding: 8px 18px;
            background: transparent;
            border: 2px solid #667eea;
            border-radius: 10px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            background: #667eea;
            color: white;
        }

        /* MAIN GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* CARDS */
        .card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title span {
            font-size: 20px;
        }

        /* UPLOAD */
        .upload-area {
            border: 2px dashed #c4b5fd;
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            background: #faf8ff;
            margin-bottom: 16px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-area:hover { border-color: #667eea; }
        .upload-area p {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
        }
        .upload-area .upload-icon { font-size: 36px; }
        #file { display: none; }
        #fileName {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
            margin-top: 8px;
            min-height: 18px;
        }
        .btn-upload {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-upload:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-upload:active { transform: translateY(0); }
        .upload-msg {
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
            min-height: 18px;
        }

        /* SHARE LINK BOX */
        .share-box {
            display: none;
            margin-top: 14px;
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 12px;
            padding: 14px;
        }
        .share-box-title {
            font-size: 12px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 8px;
        }
        .share-link-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .share-link-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #86efac;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            background: white;
            outline: none;
        }
        .btn-copy {
            padding: 8px 14px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .btn-copy:hover { opacity: 0.85; }
        .share-expiry {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
        }

        /* FILE LIST */
        .file-list { list-style: none; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f8f9ff;
            border: 1px solid #ede9fe;
            transition: background 0.2s;
        }
        .file-item:hover { background: #ede9fe; }
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .file-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .file-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .file-meta {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .btn-download {
            padding: 7px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-download:hover { opacity: 0.85; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
        .empty-state p { font-size: 14px; margin-top: 8px; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="navbar-brand">
        <div class="navbar-icon">🔒</div>
        <h1>SafeShare</h1>
    </div>
    <div class="navbar-user">
        <span>Welcome, <strong id="userName"></strong></span>
        <span class="badge">Student</span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</div>

<!-- MAIN GRID -->
<div class="grid">

    <!-- UPLOAD CARD -->
    <div class="card">
        <div class="card-title"><span>📤</span> Upload File</div>

        <div class="upload-area" onclick="document.getElementById('file').click()">
            <div class="upload-icon">📁</div>
            <p>Click to select a file</p>
            <div id="fileName"></div>
        </div>

        <input type="file" id="file" onchange="document.getElementById('fileName').innerText = this.files[0]?.name || ''">

        <button class="btn-upload" onclick="upload()">Upload File</button>
        <div class="upload-msg" id="uploadMsg"></div>

        <!-- SHARE LINK BOX — shown after successful upload -->
        <div class="share-box" id="shareBox">
            <div class="share-box-title">🔗 Share Link Generated</div>
            <div class="share-link-row">
                <input type="text" class="share-link-input" id="shareLinkInput" readonly>
                <button class="btn-copy" onclick="copyShareLink()">Copy</button>
            </div>
            <div class="share-expiry">Expires in 7 days</div>
        </div>
    </div>

    <!-- FILES CARD -->
    <div class="card">
        <div class="card-title"><span>📂</span> All Files</div>
        <ul class="file-list" id="fileList">
            <div class="empty-state">
                <div style="font-size:40px">📭</div>
                <p>Loading files...</p>
            </div>
        </ul>
    </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user") || "{}");
document.getElementById("userName").innerText = user.name || "Student";

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

const API = API_BASE;

async function upload() {
    const token = localStorage.getItem("token");
    const fileInput = document.getElementById("file");
    const msg = document.getElementById("uploadMsg");
    const shareBox = document.getElementById("shareBox");
    const shareLinkInput = document.getElementById("shareLinkInput");

    // Hide share box on new upload
    shareBox.style.display = "none";

    if (!fileInput.files.length) {
        msg.style.color = "#e53e3e";
        msg.innerText = "Please select a file first";
        return;
    }

    msg.style.color = "#667eea";
    msg.innerText = "Uploading...";

    const form = new FormData();
    form.append("file", fileInput.files[0]);

    try {
        const res = await fetch(`${API}/api/upload/upload.php`, {
            method: "POST",
            headers: { "Authorization": "Bearer " + token },
            body: form
        });
        const data = await res.json();

        if (data.status === "success") {
            msg.style.color = "#38a169";
            msg.innerText = "File uploaded successfully!";
            document.getElementById("fileName").innerText = "";
            fileInput.value = "";

            // Show share link if returned
            if (data.shareUrl) {
                shareLinkInput.value = data.shareUrl;
                shareBox.style.display = "block";
            }

            loadFiles();
        } else {
            msg.style.color = "#e53e3e";
            msg.innerText = "Error: " + data.error;
        }
    } catch (e) {
        msg.style.color = "#e53e3e";
        msg.innerText = "Upload failed: " + e;
    }
}

function copyShareLink() {
    const input = document.getElementById("shareLinkInput");
    navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.querySelector(".btn-copy");
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy", 2000);
    });
}

async function loadFiles() {
    const token = localStorage.getItem("token");
    try {
        const res = await fetch(`${API}/api/files/list.php`, {
            headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        const ul = document.getElementById("fileList");
        ul.innerHTML = "";
        if (data.status === "success" && data.files.length > 0) {
            data.files.forEach(f => {
                const li = document.createElement("li");
                li.className = "file-item";
                li.innerHTML = `
                    <div class="file-info">
                        <div class="file-icon">📄</div>
                        <div>
                            <div class="file-name">${f.filename}</div>
                            <div class="file-meta">Uploaded by ${f.uploader || 'Unknown'}</div>
                        </div>
                    </div>
                    <a href="${f.url}" target="_blank" class="btn-download">Download</a>
                `;
                ul.appendChild(li);
            });
        } else {
            ul.innerHTML = `
                <div class="empty-state">
                    <div style="font-size:40px">📭</div>
                    <p>No files uploaded yet</p>
                </div>`;
        }
    } catch (e) {
        console.error("Load files error:", e);
    }
}

loadFiles();
</script>
</body>
</html>
