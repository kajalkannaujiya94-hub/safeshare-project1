<!DOCTYPE html>
<html>
<head>
    <title>SafeShare - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="env.js"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #a78bfa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #7c3aed;
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .register-link a {
            color: #7c3aed;
            font-weight: 600;
            text-decoration: none;
        }
        .register-link a:hover { text-decoration: underline; }
        .msg {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #e53e3e;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <div class="logo-icon">🔒</div>
        <h1>SafeShare</h1>
        <p>Secure file sharing</p>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
    </div>

    <button class="btn-login" onclick="login()">Sign In</button>

    <p class="msg" id="msg"></p>

    <div class="register-link">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if (!email || !password) {
        msg.innerText = "Please fill in all fields";
        return;
    }

    msg.innerText = "Signing in...";
    msg.style.color = "#7c3aed";

    const res = await fetch(`${API_BASE}/api/auth/login.php`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.status === "success") {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        if (data.user.role === "admin") {
            window.location = "dashboard-admin.html";
        } else if (data.user.role === "teacher") {
            window.location = "dashboard-teacher.html";
        } else {
            window.location = "dashboard-student.html";
        }
    } else {
        msg.style.color = "#e53e3e";
        msg.innerText = data.error || "Login failed";
    }
}

document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") login();
});
</script>

</body>
</html>
