<!DOCTYPE html>
<html>
<head>
    <title>SafeShare - Register</title>
    <link rel="stylesheet" href="style.css">
    <script src="env.js"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #a78bfa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .register-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
            background: white;
            color: #333;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #7c3aed;
        }
        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-register:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-register:active { transform: translateY(0); }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .login-link a {
            color: #7c3aed;
            font-weight: 600;
            text-decoration: none;
        }
        .login-link a:hover { text-decoration: underline; }
        .msg {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #e53e3e;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="logo">
        <div class="logo-icon"></div>
        <h1>SafeShare</h1>
        <p>Create your account</p>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" required>
    </div>

    <div class="form-group">
        <label>Role</label>
        <select id="role" required>
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>
    </div>

    <button class="btn-register" onclick="register()">Create Account</button>

    <p class="msg" id="msg"></p>

    <div class="login-link">
        Already have an account? <a href="index.html">Sign in here</a>
    </div>
</div>

<script>
async function register() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;
    const msg = document.getElementById("msg");

    if (!name || !email || !password || !role) {
        msg.innerText = "Please fill in all fields";
        return;
    }

    msg.innerText = "Creating account...";
    msg.style.color = "#7c3aed";

    const res = await fetch(`${API_BASE}/api/auth/register.php`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, email, password, role })
    });

    const data = await res.json();

    if (data.status === "success") {
        msg.style.color = "#38a169";
        msg.innerText = "Registration successful! Redirecting...";
        setTimeout(() => window.location = "index.html", 1000);
    } else {
        msg.style.color = "#e53e3e";
        msg.innerText = data.error || "Registration failed";
    }
}
</script>

</body>
</html>
