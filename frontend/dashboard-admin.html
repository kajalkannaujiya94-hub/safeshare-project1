<!DOCTYPE html>
<html lang="en">
<head>
    <script src="env.js"></script>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SafeShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #fbbf24 100%);
            font-family: 'Segoe UI', sans-serif;
            padding: 30px 20px;
        }
        .navbar {
            background: white; border-radius: 16px; padding: 16px 28px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 30px;
        }
        .navbar-brand { display: flex; align-items: center; gap: 10px; }
        .navbar-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 18px;
        }
        .navbar-brand h1 {
            font-size: 20px; font-weight: 800;
            background: linear-gradient(135deg, #f97316, #ea580c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .navbar-user { display: flex; align-items: center; gap: 14px; }
        .navbar-user span { font-size: 14px; color: #666; font-weight: 500; }
        .navbar-user strong { color: #333; }
        .badge {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white; padding: 3px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .btn-logout {
            padding: 8px 18px; background: transparent;
            border: 2px solid #f97316; border-radius: 10px;
            color: #f97316; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { background: #f97316; color: white; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; max-width: 1100px; margin: 0 auto 24px;
        }
        .stat-card {
            background: white; border-radius: 16px; padding: 20px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .stat-label { font-size: 13px; color: #888; margin-bottom: 6px; }
        .stat-value { font-size: 28px; font-weight: 800; color: #333; }
        .tabs-wrapper {
            max-width: 1100px; margin: 0 auto 20px;
            display: flex; background: white; border-radius: 14px;
            padding: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: fit-content;
        }
        .tab {
            padding: 10px 24px; cursor: pointer; font-weight: 600;
            font-size: 14px; color: #888; border-radius: 10px; transition: all 0.2s;
        }
        .tab.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: white; border-radius: 20px; padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); max-width: 1100px; margin: 0 auto;
        }
        .card-title {
            font-size: 16px; font-weight: 700; color: #333; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .file-count { font-size: 13px; color: #888; font-weight: 400; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead tr { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
        thead th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 13px; }
        thead th:first-child { border-radius: 10px 0 0 10px; }
        thead th:last-child { border-radius: 0 10px 10px 0; }
        tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
        tbody tr:hover { background: #fff7ed; }
        tbody td { padding: 12px 16px; color: #444; }
        .role-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .role-teacher { background: #fef3c7; color: #d97706; }
        .role-student { background: #e0f2fe; color: #0369a1; }
        .role-admin { background: #ffedd5; color: #ea580c; }
        .btn-view {
            padding: 6px 14px; background: transparent; border: 1.5px solid #f97316;
            border-radius: 8px; color: #f97316; font-size: 12px; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .btn-view:hover { background: #f97316; color: white; }
        .btn-delete {
            padding: 6px 14px; background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white; border: none; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-delete:hover { opacity: 0.85; }
        .btn-delete:disabled { opacity: 0.5; cursor: default; }
        .empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
        .empty-state p { font-size: 14px; margin-top: 8px; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-brand">
        <div class="navbar-icon">🔒</div>
        <h1>SafeShare</h1>
    </div>
    <div class="navbar-user">
        <span>Welcome, <strong id="userName"></strong></span>
        <span class="badge">Admin</span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total Files</div><div class="stat-value" id="statFiles">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="statUsers">—</div></div>
    <div class="stat-card"><div class="stat-label">Teachers</div><div class="stat-value" id="statTeachers">—</div></div>
    <div class="stat-card"><div class="stat-label">Students</div><div class="stat-value" id="statStudents">—</div></div>
</div>

<div class="tabs-wrapper">
    <div class="tab active" onclick="switchTab('files')">📁 Files</div>
    <div class="tab" onclick="switchTab('users')">👥 Users</div>
</div>

<div class="tab-content active" id="tab-files">
    <div class="card">
        <div class="card-title">
            <div>📁 All Uploaded Files</div>
            <span class="file-count" id="fileCount"></span>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>#</th><th>Filename</th><th>Uploaded By</th><th>Role</th><th>Date</th><th>View</th><th>Action</th></tr></thead>
                <tbody id="filesBody">
                    <tr><td colspan="7"><div class="empty-state"><div style="font-size:40px">📭</div><p>Loading...</p></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="tab-content" id="tab-users">
    <div class="card">
        <div class="card-title">
            <div>👥 All Users</div>
            <span class="file-count" id="userCount"></span>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Action</th></tr></thead>
                <tbody id="usersBody">
                    <tr><td colspan="6"><div class="empty-state"><div style="font-size:40px">👥</div><p>Loading...</p></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function getUser() { return JSON.parse(localStorage.getItem("user") || "{}"); }
const user = getUser();
if (!user || user.role !== "admin") window.location = "index.html";
document.getElementById("userName").innerText = user.name || "Admin";
const API = API_BASE;

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
}

async function loadFiles() {
    try {
        const res = await fetch(API + "/api/files/list.php", { headers: { "Authorization": "Bearer " + localStorage.getItem("token") } });
        const data = await res.json();
        const tbody = document.getElementById("filesBody");
        if (data.status === "success" && data.files.length) {
            document.getElementById("statFiles").innerText = data.files.length;
            document.getElementById("fileCount").innerText = data.files.length + " files";
            tbody.innerHTML = data.files.map(f => `
                <tr>
                    <td style="color:#aaa;font-size:12px">${f.id}</td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${f.filename}</td>
                    <td>${f.name}</td>
                    <td><span class="role-badge role-${f.role || 'student'}">${f.role || 'student'}</span></td>
                    <td style="color:#888;font-size:12px">${formatDate(f.uploaded_at)}</td>
                    <td><a class="btn-view" href="${f.url}" target="_blank">View</a></td>
                    <td><button class="btn-delete" onclick="deleteFile(${f.id}, this)">Delete</button></td>
                </tr>`).join("");
        } else {
            document.getElementById("statFiles").innerText = "0";
            tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div style="font-size:40px">📭</div><p>No files uploaded yet</p></div></td></tr>`;
        }
    } catch(e) { console.error(e); }
}

async function loadUsers() {
    try {
        const res = await fetch(API + "/api/users/list.php", { headers: { "Authorization": "Bearer " + localStorage.getItem("token") } });
        const data = await res.json();
        const tbody = document.getElementById("usersBody");
        if (data.status === "success" && data.users.length) {
            document.getElementById("statUsers").innerText = data.users.length;
            document.getElementById("statTeachers").innerText = data.users.filter(u => u.role === 'teacher').length;
            document.getElementById("statStudents").innerText = data.users.filter(u => u.role === 'student').length;
            document.getElementById("userCount").innerText = data.users.length + " users";
            tbody.innerHTML = data.users.map(u => `
                <tr>
                    <td style="color:#aaa;font-size:12px">${u.id}</td>
                    <td style="font-weight:600">${u.name}</td>
                    <td style="color:#888">${u.email}</td>
                    <td><span class="role-badge role-${u.role}">${u.role}</span></td>
                    <td style="color:#888;font-size:12px">${formatDate(u.created_at)}</td>
                    <td>${u.role === 'admin' ? '<span style="color:#aaa;font-size:12px">Protected</span>' : `<button class="btn-delete" onclick="deleteUser(${u.id}, '${u.name}', this)">Delete</button>`}</td>
                </tr>`).join("");
        } else {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div style="font-size:40px">👥</div><p>No users found</p></div></td></tr>`;
        }
    } catch(e) { console.error(e); }
}

async function deleteFile(id, btn) {
    if (!confirm("Permanently delete this file?")) return;
    btn.innerText = "…"; btn.disabled = true;
    try {
        const res = await fetch(API + "/api/files/delete.php?id=" + id, { headers: { "Authorization": "Bearer " + localStorage.getItem("token") } });
        const data = await res.json();
        if (data.status === "success") loadFiles();
        else { alert("Error: " + data.error); btn.innerText = "Delete"; btn.disabled = false; }
    } catch(e) { alert("Delete failed."); btn.innerText = "Delete"; btn.disabled = false; }
}

async function deleteUser(id, name, btn) {
    if (!confirm(`Delete user "${name}" and all their files?`)) return;
    btn.innerText = "…"; btn.disabled = true;
    try {
        const res = await fetch(API + "/api/users/delete.php?id=" + id, { headers: { "Authorization": "Bearer " + localStorage.getItem("token") } });
        const data = await res.json();
        if (data.status === "success") { loadUsers(); loadFiles(); }
        else { alert("Error: " + data.error); btn.innerText = "Delete"; btn.disabled = false; }
    } catch(e) { alert("Delete failed."); btn.innerText = "Delete"; btn.disabled = false; }
}

function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function logout() { localStorage.clear(); window.location = "index.html"; }

loadFiles();
loadUsers();
</script>
</body>
</html>
